name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -e .
      - run: python -m py_compile pkl_pointcloud_viewer.py pkl_pointcloud_browser_viewer/app.py pkl_pointcloud_browser_viewer/point_loader.py
      - run: python pkl_pointcloud_viewer.py --help
